<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ITDIV — Work in Progress</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #fff;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      gap: 28px;
    }

    .logo img {
      width: 160px;
      height: auto;
      display: block;
      border: none;
      box-shadow: none;
      background: transparent;
    }

    .badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: #E91E8C;
      border: 1px solid #E91E8C55;
      border-radius: 100px;
      padding: 5px 16px;
    }

    .terminal {
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 18px 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.9;
      width: 100%;
      max-width: 480px;
    }
    .terminal .dots { display: flex; gap: 6px; margin-bottom: 14px; }
    .terminal .dots span { width: 10px; height: 10px; border-radius: 50%; }
    .d1 { background: #e05252; }
    .d2 { background: #e0b852; }
    .d3 { background: #52c17e; }

    .prompt { color: #1565C0; }
    .cmd    { color: #333; }
    .ok     { color: #2e7d32; }
    .warn   { color: #b45a00; }

    .cursor {
      display: inline-block;
      width: 7px; height: 0.9em;
      background: #E91E8C;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      color: #111;
      text-align: center;
    }

    p {
      font-size: 0.92rem;
      color: #666;
      text-align: center;
      max-width: 400px;
      line-height: 1.7;
    }

    .progress-wrap { width: 100%; max-width: 480px; }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.74rem;
      color: #999;
      margin-bottom: 8px;
    }
    .progress-meta strong { color: #111; }
    .track {
      height: 4px;
      background: #e8e8e8;
      border-radius: 100px;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1565C0, #E91E8C);
      border-radius: 100px;
      transition: width 2s cubic-bezier(.4,0,.2,1);
    }

    .ping-line {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: #aaa;
      text-align: center;
    }
    .ping-line a {
      color: #1565C0;
      text-decoration: none;
    }
    .ping-line a:hover { text-decoration: underline; }
  </style>
</head>

  <script>
    const lines = [
      ['t1', null,  'itdiv-deploy --env production', 50],
      ['t2', 'l2',  '✔  Dependencies installed (v3.14.2)', 22],
      ['t3', 'l3',  '⚠  awaiting final QA sign-off (67%)…', 22],
      ['t4', 'l4',  'ping sharepoint.com/ITDsite --until-ready', 50],
    ];

    function type(id, show, text, speed, cb) {
      if (show) document.getElementById(show).style.display = '';
      const el = document.getElementById(id);
      let i = 0;
      const tick = () => { el.textContent = text.slice(0,++i); i < text.length ? setTimeout(tick,speed) : cb && setTimeout(cb,400); };
      tick();
    }

    function run(i){ if(i<lines.length) type(...lines[i], ()=>run(i+1)); }
    setTimeout(()=>run(0), 500);

    setTimeout(()=>{
      document.getElementById('fill').style.width = '67%';
      let n=0; const s=()=>{ document.getElementById('pct').textContent=(++n)+'%'; n<67&&requestAnimationFrame(s); }; requestAnimationFrame(s);
    }, 800);
